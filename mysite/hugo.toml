baseURL = "/"
theme = "dark-theme-editor"

# 语言设置
defaultContentLanguage = "zh"
languageCode = "zh-CN"

[module]
    [module.hugoVersion]
        min = "0.151.0"

[taxonomies]
    tag = "tags"
    category = "categories"

[params]
    [params.site]
        localCss = []
        externalCss = []
        externalCssDownload = []
        localJs = []
        externalJs = []
        externalJsDownload = []
        faviconUrl = ""
        googleVerification = ""
        bingVerifivation = ""

    [params.header]
        title = "装修手记"
        subtitle = "记录一个家的诞生过程"

        [params.header.logo]
            imgUrl = ""
            logoLink = ""

    [params.footer]
        copyrightStr = "版权所有 ®"
        counter = true
        language = false
        hugoVersion = false
        theme = false
        modifiedTime = true
        dateFormat = "2006年01月02日 15:04:05"
        gitHash = false

        [params.footer.socialLink]
            github = ""
            facebook = ""
            twitter = ""
            email = ""
            linkedin = ""
            instagram = ""
            telegram = ""
            medium = ""
            vimeo = ""
            youtube = ""

    [params.globalFrontmatter]
        author = "屋主"
        description = "记录装修过程中的沟通、设计、进度与灵感"
        keywords = "装修,家装,设计,施工,日记"

    [params.homePage]
        siteLongDescription = "这里记录了一次完整装修旅程中的点滴：与设计师和工长的沟通记录、设计方案的反复迭代、施工进度的实时把控，以及随时迸发的灵感头脑风暴。"
        siteLongDescriptionTitle = "关于本站"
        showRecentPostsBlock = true
        numOfRecentPosts = 6
        recentPostShowUrl = false

    [params.page]
        includeToc = true
        showAuthor = true
        showDate = true
        dateFormat = "2006年01月02日"
        showTimeToRead = true
        showBreadcrumb = true
        codeBlockCopible = true
        useMath = false
        trustedmath = false

    [params.preference]
        showFileName = false
        sortBy = "weight"
        sortInAsc = false
